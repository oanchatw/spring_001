name: tripradius_app
description: TripRadius - Plan. Discover. Go.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: ">=3.29.2"

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.2.7

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  equatable: ^2.0.5

  # Network
  dio: ^5.7.0
  retrofit: ^4.4.1
  json_annotation: ^4.9.0
  cookie_jar: ^4.0.8
  dio_cookie_manager: ^3.1.1

  # DI
  get_it: ^8.0.2

  # Google Maps
  google_maps_flutter: ^2.9.0

  # WebView (for OAuth2 login)
  webview_flutter: ^4.10.0

  # Secure Storage
  flutter_secure_storage: ^9.2.2

  # UI
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.14
  retrofit_generator: ^9.1.6
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
