# =============================================
# Spring Map App - 設定檔（PostgreSQL）
# =============================================

server.port=8080

# =============================================
# PostgreSQL 資料庫設定
# 請將以下三個值替換成你的實際資料庫資訊，
# 或使用環境變數方式注入（推薦，避免金鑰外洩）
# =============================================
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:mapapp_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:mapapp1234}
spring.datasource.driver-class-name=org.postgresql.Driver

# 連線池設定（HikariCP，Spring Boot 預設）
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# JPA / Hibernate 設定
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
# update = 自動建立/更新資料表，不刪除現有資料
# create-drop = 每次重啟清空（僅開發測試用）
# validate = 僅驗證 Schema，不自動修改（生產環境推薦）
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =============================================
# Google OAuth2 設定
# 請至 Google Cloud Console 取得 Client ID / Secret
# =============================================
spring.security.oauth2.client.registration.google.client-id=${GOOGLE_CLIENT_ID:your-client-id-here}
spring.security.oauth2.client.registration.google.client-secret=${GOOGLE_CLIENT_SECRET:your-client-secret-here}
spring.security.oauth2.client.registration.google.scope=openid,profile,email
spring.security.oauth2.client.registration.google.redirect-uri={baseUrl}/login/oauth2/code/{registrationId}

# =============================================
# Google Maps API Key
# =============================================
google.maps.api-key=${GOOGLE_MAPS_API_KEY:your-maps-api-key-here}
google.maps.base-url=https://maps.googleapis.com/maps/api
